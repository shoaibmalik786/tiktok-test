default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  username: <%= ENV.fetch("DB_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "postgres" } %>
  port: 5432
  database: <%= ENV.fetch("POSTGRES_DB_NAME") { "mission_development" } %>

development:
  <<: *default

test:
  <<: *default
  database: mission_test

staging:
  <<: *default

production:
  <<: *default

